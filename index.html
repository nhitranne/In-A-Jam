<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In A Jam — Gác Lại Bộn Bề, Tìm Về Thảnh Thơi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF3E7;
    --paper:#FFFDF8;
    --ink:#3A2A22;
    --ink-soft:#6B5A4F;
    --marmalade:#C97B3D;
    --marmalade-deep:#A85F28;
    --plum:#6B3A5C;
    --plum-soft:#8C5679;
    --sage:#8A9B6E;
    --mustard:#E3A857;
    --line: rgba(58,42,34,0.12);
    --footer-brown:#4B3A26;
    --radius: 22px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Be Vietnam Pro', sans-serif;
    font-weight:400;
    line-height:1.6;
    overflow-x:hidden;
  }
  h1,h2,h3,h4{
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing:-0.01em;
    color:var(--ink);
  }
  a{text-decoration:none; color:inherit;}
  img{max-width:100%; display:block;}
  ::selection{background:var(--mustard); color:var(--ink);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  /* ---------- NAV ---------- */
  header{
    position:sticky; top:0; z-index:100;
    background:rgba(251,243,231,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-wrap{
    max-width:1200px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px;
  }
  .logo{
    display:flex; align-items:center; gap:10px;
    font-family:'Fraunces',serif; font-weight:700; font-size:1.3rem;
    color:var(--marmalade-deep);
  }
  .logo-mark{
    width:38px; height:38px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--mustard), var(--marmalade));
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color:var(--paper); font-size:.85rem;
    box-shadow:0 3px 8px rgba(169,95,40,.35);
  }
  nav ul{list-style:none; display:flex; gap:26px; align-items:center;}
  nav a{font-size:.92rem; font-weight:500; color:var(--ink-soft); transition:color .2s;}
  nav a:hover{color:var(--marmalade-deep);}
  .nav-icons{display:flex; align-items:center; gap:16px;}
  .icon-btn{
    position:relative; width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line); background:var(--paper); cursor:pointer;
    transition:transform .15s, border-color .15s;
  }
  .icon-btn:hover{transform:translateY(-2px); border-color:var(--marmalade);}
  .cart-badge{
    position:absolute; top:-6px; right:-6px;
    background:var(--plum); color:#fff; font-size:.65rem; font-weight:700;
    min-width:18px; height:18px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; padding:0 3px;
  }
  .menu-toggle{display:none;}
  @media (max-width: 860px){
    nav ul{display:none;}
    .menu-toggle{display:flex;}
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative; min-height:88vh;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(227,168,87,0.35), transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(107,58,92,0.18), transparent 55%),
      var(--cream);
  }
  .hero-inner{
    position:relative; z-index:3; text-align:center; max-width:760px; padding:0 24px;
  }
  .hero-eyebrow{
    font-size:.8rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--marmalade-deep); font-weight:600; margin-bottom:18px;
    opacity:0; animation:fadeUp .8s ease forwards; animation-delay:2.5s;
  }
  .hero h1{
    font-size:clamp(2.1rem, 4.6vw, 3.4rem);
    line-height:1.18;
    margin-bottom:18px;
    opacity:0; animation:fadeUp .9s ease forwards; animation-delay:2.7s;
  }
  .hero p.sub{
    font-size:1.08rem; color:var(--ink-soft); max-width:560px; margin:0 auto 34px;
    opacity:0; animation:fadeUp .9s ease forwards; animation-delay:2.9s;
  }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }

  .cta-btn{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--ink); color:var(--paper);
    padding:15px 34px; border-radius:999px; font-weight:600; font-size:.98rem;
    border:none; cursor:pointer;
    transition:background .25s, transform .2s;
    opacity:0; animation:fadeUp .9s ease forwards; animation-delay:3.1s;
  }
  .cta-btn:hover{background:var(--marmalade-deep); transform:translateY(-3px);}



  /* ---------- SECTIONS SHARED ---------- */
  section{ padding:104px 24px; position:relative; }
  .section-inner{ max-width:1120px; margin:0 auto; }
  .eyebrow{
    font-size:.78rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--marmalade-deep); font-weight:600; margin-bottom:14px;
  }
  .section-title{ font-size:clamp(1.7rem, 3vw, 2.3rem); margin-bottom:20px; max-width:680px;}

  .drip-divider{ width:100%; height:60px; display:block; }

  /* ---------- BRAND STORY ---------- */
  .story{
    background:var(--paper);
  }
  .story-grid{
    display:grid; grid-template-columns:0.9fr 1.1fr; gap:64px; align-items:center;
  }
  .story-visual{
    position:relative; aspect-ratio:1/1; border-radius:32px;
    background: linear-gradient(160deg, #F3D9A4, var(--marmalade) 60%, var(--plum-soft));
    overflow:hidden;
  }
  .jam-drip{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,.35), transparent 45%);
  }
  .story-img{ width:100%; height:100%; object-fit:cover; display:block; }
  .jam-blob{
    position:absolute; border-radius:50%; opacity:.85; filter:blur(0px);
    animation: blobFloat 7s ease-in-out infinite;
  }
  @keyframes blobFloat{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-14px);} }
  .story p{ color:var(--ink-soft); margin-bottom:16px; max-width:520px; }
  .story .tagline{
    font-family:'Fraunces',serif; font-style:italic; font-size:1.25rem; color:var(--marmalade-deep);
    margin-top:18px;
  }
  @media (max-width:860px){ .story-grid{grid-template-columns:1fr; gap:36px;} }

  /* ---------- TAROT INVITE ---------- */
  .tarot-invite{
    background: linear-gradient(180deg, var(--paper), var(--cream));
    text-align:center;
  }
  .tarot-lead{ max-width:560px; margin:0 auto 48px; color:var(--ink-soft); font-size:1.05rem;}
  .cards-row{ display:flex; justify-content:center; gap:28px; flex-wrap:wrap; perspective:1400px; }
  .tcard{
    width:150px; height:230px; position:relative; cursor:pointer;
    transform-style:preserve-3d; transition:transform .7s cubic-bezier(.4,.2,.2,1);
  }
  .tcard.flipped{ transform:rotateY(180deg); }
  .tcard .face{
    position:absolute; inset:0; border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    backface-visibility:hidden; text-align:center;
    box-shadow:0 14px 30px rgba(58,42,34,.18);
    overflow:hidden;
  }
  .tcard .back{
    background:
      repeating-linear-gradient(135deg, var(--plum) 0 8px, var(--plum-soft) 8px 16px);
    border:3px solid var(--mustard);
  }
  .tcard .back::after{
    content:"✦"; color:var(--mustard); font-size:1.6rem;
  }
  .tcard .front{
    background:var(--paper); transform:rotateY(180deg);
    border:2px solid var(--marmalade); flex-direction:column;
    padding:0;
  }
  .tcard .front img{ width:100%; height:100%; object-fit:cover; display:block; }
  .tcard .front .front-nofig{
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:6px; padding:14px; height:100%; color:var(--ink-soft); font-size:.78rem;
  }
  .tcard .front-caption{
    position:absolute; left:0; right:0; bottom:0;
    background:rgba(58,42,34,.72); color:var(--paper);
    font-size:.72rem; font-weight:600; padding:6px 8px;
  }
  .tarot-msg{
    max-width:760px; margin:40px auto 0; background:var(--paper);
    border:1px solid var(--line); border-radius:20px; padding:28px;
    display:none; text-align:left;
  }
  .tarot-msg.show{ display:block; animation:fadeUp .5s ease forwards; }
  .tarot-msg-inner{ display:flex; gap:28px; align-items:flex-start; }
  .tarot-msg-img{
    flex:0 0 160px; width:160px; border-radius:12px; overflow:hidden;
    box-shadow:0 10px 22px rgba(58,42,34,.2); border:2px solid var(--marmalade);
  }
  .tarot-msg-img img{ width:100%; display:block; }
  .tarot-msg-text{ flex:1; min-width:0; }
  .tarot-msg h4{ color:var(--marmalade-deep); margin-bottom:10px; font-size:1.2rem; }
  .tarot-msg p{ color:var(--ink-soft); font-size:.95rem; white-space:pre-line; }
  @media (max-width:640px){
    .tarot-msg-inner{ flex-direction:column; align-items:center; }
    .tarot-msg-img{ flex:0 0 auto; width:140px; }
  }
  .reshuffle{
    margin-top:26px; background:none; border:1px solid var(--line);
    padding:10px 22px; border-radius:999px; cursor:pointer; font-weight:500;
    color:var(--ink-soft); transition:border-color .2s, color .2s;
  }
  .reshuffle:hover{ border-color:var(--marmalade); color:var(--marmalade-deep); }

  /* ---------- COLLECTION (Bộ Sưu Tập) ---------- */
  .collection{ background:var(--cream); }
  .collection-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center;
  }
  .collection-text p{ color:var(--ink-soft); max-width:480px; margin-bottom:26px; }
  .collection-cta{ position:static; opacity:1; animation:none; }
  .collection-visual{
    border-radius:28px; overflow:hidden; aspect-ratio:1/1;
    box-shadow:0 20px 44px rgba(58,42,34,.18);
  }
  .collection-img{ width:100%; height:100%; object-fit:cover; display:block; }
  @media (max-width:860px){
    .collection-grid{ grid-template-columns:1fr; gap:32px; }
    .collection-visual{ order:-1; }
  }

  /* ---------- TESTIMONIALS ---------- */
  .testi{ background:var(--paper); text-align:center; }
  .testi .section-title{ margin-left:auto; margin-right:auto; }
  .brand-safe{
    font-family:'Be Vietnam Pro', sans-serif; font-style:normal; font-weight:700;
    color:var(--marmalade-deep);
  }
  .testi-carousel{
    max-width:820px; margin:44px auto 0; overflow:hidden; border-radius:24px;
  }
  .testi-track{ display:flex; transition:transform .5s cubic-bezier(.4,.2,.2,1); }
  .testi-slide{
    flex:0 0 100%; display:grid; grid-template-columns:220px 1fr; gap:32px;
    align-items:center; text-align:left;
    background:var(--cream); border:1px solid var(--line); border-radius:24px; padding:30px;
  }
  .testi-photo{
    width:100%; aspect-ratio:1/1; border-radius:18px; overflow:hidden;
    box-shadow:0 12px 26px rgba(58,42,34,.16);
  }
  .testi-photo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .testi-quote{ font-size:1rem; color:var(--ink-soft); margin-top:10px; }
  .stars{ color:var(--mustard); letter-spacing:2px; }
  @media (max-width:640px){
    .testi-slide{ grid-template-columns:1fr; text-align:center; padding:24px; }
    .testi-photo{ max-width:200px; margin:0 auto; }
  }

  /* ---------- FOOTER (placeholder pending brand asset) ---------- */
  footer{
    background:var(--ink); color:var(--cream); padding:64px 24px 30px;
  }
  .footer-inner{
    max-width:1120px; margin:0 auto;
    display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:40px;
  }
  @media (max-width:800px){ .footer-inner{grid-template-columns:1fr 1fr;} }
  .footer-brand{ display:flex; flex-direction:column; gap:14px; }
  .footer-logo{ display:flex; align-items:center; gap:10px; }
  .footer-note{ font-size:.78rem; color:rgba(251,243,231,.5); margin-top:6px; }
  footer h5{ font-family:'Fraunces',serif; font-size:.95rem; margin-bottom:14px; color:var(--mustard); }
  footer ul{ list-style:none; display:flex; flex-direction:column; gap:10px; }
  footer a{ font-size:.88rem; color:rgba(251,243,231,.75); transition:color .2s; }
  footer a:hover{ color:#fff; }
  .footer-bottom{
    max-width:1120px; margin:44px auto 0; padding-top:22px;
    border-top:1px solid rgba(251,243,231,.15);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;
    font-size:.78rem; color:rgba(251,243,231,.5);
  }

  .placeholder-flag{
    display:inline-block; margin-top:6px; font-size:.72rem;
    background:rgba(227,168,87,.15); color:var(--mustard);
    padding:3px 10px; border-radius:999px; border:1px dashed rgba(227,168,87,.4);
  }

  /* ---------- HERO ILLUSTRATION (full-bleed brand artwork) ---------- */
  .hero{
    padding:0; min-height:auto; background:var(--cream);
  }
  .hero-inner{
    position:relative; width:100%; max-width:none; padding:0; margin:0;
    display:block; line-height:0;
  }
  .hero-illustration{
    width:100%; height:auto; display:block; border-radius:0; box-shadow:none;
    opacity:0; transform:scale(1.02);
    animation: heroReveal 1.2s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes heroReveal{
    to{ opacity:1; transform:scale(1); }
  }
  .hero-cta{
    position:absolute; left:75%; top:75%; transform:translate(-50%,-50%);
    opacity:0; animation:heroCtaFade .8s ease forwards; animation-delay:.8s;
    box-shadow:0 10px 26px rgba(58,42,34,.35);
  }
  @keyframes heroCtaFade{
    from{opacity:0; transform:translate(-50%,-50%) translateY(16px);}
    to{opacity:1; transform:translate(-50%,-50%) translateY(0);}
  }
  @media (max-width:700px){
    .hero-cta{ padding:11px 22px; font-size:.85rem; }
  }

  /* ---------- LOGO IMAGE (nav + footer) ---------- */
  .logo-mark-img{
    width:40px; height:40px; border-radius:50%; object-fit:cover;
    box-shadow:0 3px 8px rgba(75,58,38,.35);
    border:2px solid var(--paper);
  }
  .footer-logo-img{
    width:92px; height:92px; border-radius:50%; object-fit:cover;
    box-shadow:0 6px 16px rgba(0,0,0,.3);
    border:3px solid rgba(251,243,231,.5);
  }

  /* ---------- FOOTER (matches brand reference) ---------- */
  footer{ background:var(--footer-brown); }
  .footer-inner{
    grid-template-columns: 1.1fr 1.2fr 1fr;
    align-items:start;
  }
  .footer-brand{ align-items:flex-start; gap:12px; }
  .footer-wordmark{
    font-family:'Fraunces', serif; font-style:italic; font-weight:600;
    font-size:1.5rem; color:var(--cream);
  }
  .footer-tagline{
    font-size:.85rem; font-style:italic; color:rgba(251,243,231,.65);
    max-width:220px;
  }
  .footer-col h5{ color:var(--cream); font-size:.92rem; margin-bottom:14px; font-weight:600; font-family:'Be Vietnam Pro',sans-serif; }
  ul.plain{ list-style:none; display:flex; flex-direction:column; gap:9px; }
  ul.plain li{ font-size:.86rem; color:rgba(251,243,231,.8); line-height:1.6; }
  ul.plain li a:hover{ color:#fff; }
  .social-row{ display:flex; gap:12px; margin-bottom:8px; }
  .social-icon{
    width:38px; height:38px; border-radius:50%;
    border:1px solid rgba(251,243,231,.35);
    display:flex; align-items:center; justify-content:center;
    color:var(--cream); transition:background .2s, transform .15s;
  }
  .social-icon:hover{ background:rgba(251,243,231,.15); transform:translateY(-2px); }
  @media (max-width:800px){
    .footer-inner{ grid-template-columns:1fr 1fr; }
    .footer-brand{ grid-column: 1 / -1; }
  }
</style>
</head>
